name: Deploy (Production)

on:
  push:
    branches:
      - "production"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" | tr -d '\r' > key.pem
          chmod 600 key.pem

          ssh -o StrictHostKeyChecking=no -i key.pem prod@20.40.44.110 << 'EOF'

            echo "🚀 PROD Deployment Started"

            cd ~/ci-cd || exit

            # ✅ Load Node
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            nvm use --lts

            echo "📥 Updating code"
            git fetch origin
            git reset --hard origin/production

            echo "📦 Installing dependencies"
            pnpm install --frozen-lockfile

            echo "🧹 Cleaning old build"
            rm -rf apps/web/.next

            echo "🏗️ Building frontend"
            cd apps/web
            pnpm run build

            echo "♻️ Reload frontend (ZERO downtime)"
            pm2 reload fe-server || pm2 start npm --name "fe-server" -- start

            echo "🔁 Restart backend"

            cd ../http-server
            pm2 restart http-server || pm2 start npm --name "http-server" -- start

            cd ../ws-server
            pm2 restart ws-server || pm2 start npm --name "ws-server" -- start

            echo "💾 Saving PM2"
            pm2 save

            echo "📊 PM2 Status"
            pm2 list

            echo "✅ PROD Deployment Done"

          EOF
