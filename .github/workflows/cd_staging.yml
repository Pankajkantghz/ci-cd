name: Deploy to staging

on:
  push:
    branches:
      - "main"

jobs:
  redeploy_everything:
    runs-on: ubuntu-latest

    steps:
      - name: 🚀 Start Pipeline
        run: echo "CI/CD Started"

      - name: 🔐 Setup SSH & Deploy
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" | tr -d '\r' > key.pem
          chmod 600 key.pem

          ssh -o StrictHostKeyChecking=no -i key.pem dev@20.197.45.185 << 'EOF'

            echo "🚀 Connected to server"

            cd ~/ci-cd || exit

            echo "📥 Updating latest code"
            git fetch origin
            git reset --hard origin/main

            echo "📦 Installing pnpm if not exists"
            if ! command -v pnpm &> /dev/null
            then
              npm install -g pnpm
            fi

            echo "📦 Installing dependencies"
            pnpm install

            echo "🏗️ Building project"
            pnpm run build

            echo "♻️ Restarting services"

            cd apps/web && pm2 restart fe-server || pm2 start npm --name "fe-server" -- start

            cd ../http-server && pm2 restart http-server || pm2 start npm --name "http-server" -- start

            cd ../ws-server && pm2 restart ws-server || pm2 start npm --name "ws-server" -- start

            echo "💾 Saving PM2 state"
            pm2 save

            echo "✅ Deployment successful at $(date)"

          EOF

      - name: 🎉 End Pipeline
        run: echo "CI/CD Finished"
